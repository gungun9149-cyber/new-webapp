              detail = markertitle + "</br>" + markerdetail + "</br><button onclick='route(" + markerlat + "," + markerlng + ")'>นำทาง</button>"

              attachSecretMessage(marker[markerid], detail);

              side_bar_html += "<option value="+ markerid + ">" + markertitle + "<\/option>";
                       
            
          }

          function attachSecretMessage(marker, secretMessage) {
              var infowindow = new google.maps.InfoWindow({
                  content: secretMessage
              });

              marker.addListener('click', function () {
                  infowindow.open(marker.get('map'), marker);
              });
          }

          function route(lat, long) {
              window.open("https://www.google.com/maps/dir/?api=1&origin=" + melocaltion + "&destination=" + lat + "," + long,'_blank');
          }

          function myclick(i) {
              maps.setCenter(marker[i].getPosition());
              google.maps.event.trigger(marker[i], "click");
          }

      </script>
      <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCqB9LqLIUiVhCwpF95RPbM6KU10IdtjkI&callback=initMap" type="text/javascript"></script>
